<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caza Notas - Musicala</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="game-container">

<h1>🎵 Caza Notas</h1>

<p class="subtitle">Escucha la nota y adivina cuál es</p>

<button id="playNote">🔊 Escuchar Nota</button>

<div class="buttons">

<button class="note-btn" data-note="C">Do</button>
<button class="note-btn" data-note="D">Re</button>
<button class="note-btn" data-note="E">Mi</button>
<button class="note-btn" data-note="F">Fa</button>
<button class="note-btn" data-note="G">Sol</button>
<button class="note-btn" data-note="A">La</button>
<button class="note-btn" data-note="B">Si</button>

</div>

<p id="result"></p>

<p class="score">Puntos: <span id="score">0</span></p>

</div>

<script src="app.js"></script>

</body>
</html>
